<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="RepoOwl — AI-powered, client-side duplicate detection directly in your browser. Cut GitHub issue triage time in half. Zero server costs. Absolute data privacy.">
  <meta name="keywords" content="RepoOwl, GitHub, issue triage, duplicate detection, Chrome extension, AI, LLaMA">
  <meta name="author" content="RepoOwl">
  <meta property="og:title" content="RepoOwl — Cut GitHub issue triage time in half">
  <meta property="og:description" content="AI-powered, client-side duplicate detection directly in your browser. Zero server costs. Absolute data privacy.">
  <meta property="og:type" content="website">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="RepoOwl">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/svg+xml" href="OWL.svg"/>
  <title>RepoOwl — AI-Powered GitHub Issue Triage</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* Global styles only */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #0D1117;
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0D1117; }
    ::-webkit-scrollbar-thumb { background: #30363D; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #FF5722; }
  </style>
</head>
<body>

<!-- The loader content is stored in a template and injected into a Shadow DOM.
     This completely isolates the complex SVG from Flutter's HTML renderer,
     preventing the dreaded `TypeError: setAttribute` crash when Flutter
     tries to querySelector('svg') globally. -->
<template id="loader-template">
  <style>
    /* ── Loader shell ── */
    #owl-loader {
      position: fixed; inset: 0;
      background-color: #0D1117;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      will-change: opacity, background-color;
      transform: translateZ(0);
      transition: opacity 1.2s ease-in-out, background-color 1.2s ease-out;
    }
    #owl-loader.step-7 {
      background-color: transparent;
    }
    #owl-loader.exit { opacity: 0; pointer-events: none; }

    /* ── Main animation canvas ── */
    #anim-stage {
      width: 280px; height: 280px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Ripple rings ── */
    .ripple {
      position: absolute;
      width: 140px; height: 140px;
      border-radius: 50%;
      border: 40px solid #FF7043;
      opacity: 0;
      pointer-events: none;
      will-change: transform, opacity;
      transform: scale(1);
    }
    .step-7 .r1 { transition: transform 2.2s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 2.2s ease-out; transform: scale(35); opacity: 0; }
    .step-7 .r2 { transition: transform 2.2s cubic-bezier(0.1, 0.8, 0.2, 1) 0.35s, opacity 2.2s ease-out 0.35s; transform: scale(35); opacity: 0; }
    .r3 { display: none; }
    
    /* Reveal ripples briefly before fading out */
    .step-7 .ripple { opacity: 1; } 

    /* ── Brand row ── */
    .owl-brand {
      margin-top: 28px;
      font-size: 26px; font-weight: 800;
      color: #F0F6FC; letter-spacing: -0.5px;
      opacity: 0; will-change: opacity, transform;
      transform: translateY(12px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      font-family: 'Inter', sans-serif;
    }
    .step-1 .owl-brand { opacity: 1; transform: translateY(0); }
    
    .owl-sub {
      margin-top: 5px;
      font-size: 12px; color: #8B949E;
      opacity: 0; will-change: opacity;
      transition: opacity 0.6s ease 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .step-1 .owl-sub { opacity: 1; }

    /* ── Shimmer bar ── */
    .owl-bar-wrap {
      width: 200px; height: 2px;
      background: rgba(48,54,61,0.7);
      border-radius: 99px;
      margin-top: 36px; overflow: hidden;
      opacity: 0; transition: opacity 0.6s ease 0.3s;
    }
    .step-1 .owl-bar-wrap { opacity: 1; }
    .owl-bar-fill {
      width: 50%; height: 100%;
      background: linear-gradient(90deg,transparent,#FF5722,#FF8A65,transparent);
      border-radius: 99px;
      will-change: transform;
      animation: shimmer 1.3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-200%); }
      100% { transform: translateX(400%); }
    }

    /* ══════════════════════════════════════════════════════════
       PURE CSS SVG ANIMATION ENGINE
    ══════════════════════════════════════════════════════════ */
    .tr-op {
      opacity: 0;
      will-change: opacity;
      transition: opacity 0.4s ease;
    }
    
    .orbit-group {
      transform-origin: 250px 300px;
      will-change: transform;
    }
    .step-0 .orbit-group {
      animation: orbit-sequence 4.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }
    @keyframes orbit-sequence {
      0%   { transform: rotate(0deg); }
      50%  { transform: rotate(450deg); } 
      100% { transform: rotate(720deg); } 
    }

    .orb-sym { transform-origin: 0 0; will-change: transform; }
    .step-0 .orb-sym {
      animation: anti-orbit 4.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }
    @keyframes anti-orbit {
      0%   { transform: rotate(0deg); }
      50%  { transform: rotate(-450deg); }
      100% { transform: rotate(-720deg); }
    }

    /* Layer transitions */
    .step-0 .sym-fade { opacity: 1; transition-duration: 0.6s; }
    .step-0 .owl-wings { opacity: 1; transition-duration: 0.8s; transition-delay: 0.2s; }
    .step-0 .eye-circle { opacity: 1; transition-duration: 0.6s; transition-delay: 0.4s; }
    .step-0 .beak-normal { opacity: 1; transition-duration: 0.4s; transition-delay: 0.5s; }
    .step-0 .pupils { opacity: 1; transition-duration: 0.5s; transition-delay: 0.6s; }
    .step-0 .pupil-white { opacity: 1; }
    
    .pupils { will-change: transform; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .step-2 .pupils { transform: translateY(-25px); }
    
    .step-3 .beak-normal { opacity: 0; }
    .step-3 .mouth-angry { opacity: 1; }
    .step-3 .brow-L, .step-3 .brow-R { opacity: 1; transition-duration: 0.3s; }
    .step-3 .pupil-white { opacity: 0; }
    .step-3 .pupil-yellow { opacity: 1; }
    .step-3 .eye-orange { opacity: 1; transition-duration: 0.6s; }

    .sym-target-bg { transition: opacity 0.4s ease; }
    .sym-target-text { transition: fill 0.4s ease; }
    .step-4 .sym-target-bg { opacity: 1; }
    .step-4 .sym-target-text { fill: #DA3633; filter: url(#glow-red); }

    .step-5 .sym-other { opacity: 0; transition-duration: 0.3s; }
    .sym-target-wrap { will-change: transform; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .step-5 .sym-target-wrap { transform: translateY(200px) scale(0.1); opacity: 0; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease 0.3s; }
    
    .step-5 .pupils { opacity: 0; transition-duration: 0.2s; }
    .step-5 .code-eye { opacity: 1; transition-duration: 0.5s; transition-delay: 0.15s; }

    .step-6 .mouth-angry { opacity: 0; transition-duration: 0.2s; }
    .step-6 .beak-final { opacity: 1; transition-duration: 0.4s; transition-delay: 0.1s; }
    .step-6 .owl-foot { opacity: 1; transition-duration: 0.4s; transition-delay: 0.2s; }
    .step-6 .eye-orange { opacity: 0; transition-duration: 0.4s; }

    .step-7 .owl-final { opacity: 1; transition-duration: 0.2s; transition-delay: 0s; }
    .step-7 .hide-on-final { opacity: 0; transition-duration: 0.2s; }
    
    /* Fade out the SVG stage and texts entirely so flutter shows clearly */
    .step-7 #anim-stage { opacity: 0; transition: opacity 0.8s ease-out 0.4s; }
    .step-7 .owl-brand { opacity: 0; transition: opacity 0.5s ease-out; }
    .step-7 .owl-sub { opacity: 0; transition: opacity 0.5s ease-out; }
    .step-7 .owl-bar-wrap { opacity: 0; transition: opacity 0.3s ease-out; }
  </style>

  <div id="owl-loader">
    <div id="anim-stage">
      <div class="ripple r1"></div>
      <div class="ripple r2"></div>
      <div class="ripple r3"></div>

      <svg id="owl-svg" viewBox="0 0 500 500" width="240" height="240"
           xmlns="http://www.w3.org/2000/svg"
           style="overflow:visible; will-change:transform; transform:translateZ(0)">
        <defs>
          <filter id="glow-yellow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glow-red" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="10" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <g class="orbit-group hide-on-final">
          <g class="sym-target-wrap" transform="translate(250,100)">
            <g class="orb-sym">
              <rect class="sym-target-bg tr-op" x="-55" y="-27" width="110" height="54" rx="10" fill="rgba(218,54,51,0.15)" stroke="rgba(218,54,51,0.6)" stroke-width="2" filter="url(#glow-red)" />
              <text class="sym-fade sym-target-text tr-op" font-family="JetBrains Mono,monospace" font-size="36" fill="rgba(47,129,247,0.75)" text-anchor="middle" dominant-baseline="central">&lt;/&gt;</text>
            </g>
          </g>

          <g transform="translate(391,141)">
            <g class="orb-sym"><text class="sym-fade sym-other tr-op" font-family="JetBrains Mono,monospace" font-size="36" fill="rgba(59,185,80,0.7)" text-anchor="middle" dominant-baseline="central">{}</text></g>
          </g>
          <g transform="translate(450,300)">
            <g class="orb-sym"><text class="sym-fade sym-other tr-op" font-family="JetBrains Mono,monospace" font-size="32" fill="rgba(139,92,246,0.7)" text-anchor="middle" dominant-baseline="central">()</text></g>
          </g>
          <g transform="translate(391,459)">
            <g class="orb-sym"><text class="sym-fade sym-other tr-op" font-family="JetBrains Mono,monospace" font-size="32" fill="rgba(210,153,34,0.7)" text-anchor="middle" dominant-baseline="central">[]</text></g>
          </g>
          <g transform="translate(250,500)">
            <g class="orb-sym"><text class="sym-fade sym-other tr-op" font-family="JetBrains Mono,monospace" font-size="30" fill="rgba(218,54,51,0.7)" text-anchor="middle" dominant-baseline="central">=&gt;</text></g>
          </g>
          <g transform="translate(109,459)">
            <g class="orb-sym"><text class="sym-fade sym-other tr-op" font-family="JetBrains Mono,monospace" font-size="30" fill="rgba(47,129,247,0.65)" text-anchor="middle" dominant-baseline="central">/*</text></g>
          </g>
          <g transform="translate(50,300)">
            <g class="orb-sym"><text class="sym-fade sym-other tr-op" font-family="JetBrains Mono,monospace" font-size="32" fill="rgba(59,185,80,0.65)" text-anchor="middle" dominant-baseline="central">##</text></g>
          </g>
          <g transform="translate(109,141)">
            <g class="orb-sym"><text class="sym-fade sym-other tr-op" font-family="JetBrains Mono,monospace" font-size="32" fill="rgba(255,87,34,0.65)" text-anchor="middle" dominant-baseline="central">$$</text></g>
          </g>
        </g>

        <path class="owl-wings tr-op hide-on-final"
          d="M 60 280 L 70 110 L 210 200 L 250 230 L 290 200 L 430 110 L 440 280"
          fill="none" stroke="#ffffff" stroke-width="32"
          stroke-linecap="round" stroke-linejoin="round" />

        <circle class="eye-circle tr-op hide-on-final" cx="150" cy="300" r="90" fill="#1a1f2e" stroke="#ffffff" stroke-width="32" />
        <circle class="eye-circle tr-op hide-on-final" cx="350" cy="300" r="90" fill="#1a1f2e" stroke="#ffffff" stroke-width="32" />
        
        <circle class="eye-orange tr-op hide-on-final" cx="150" cy="300" r="90" fill="rgba(255,87,34,0.15)" />
        <circle class="eye-orange tr-op hide-on-final" cx="350" cy="300" r="90" fill="rgba(255,87,34,0.15)" />

        <g class="pupils tr-op hide-on-final">
          <circle class="pupil-white tr-op" cx="150" cy="300" r="30" fill="#ffffff" />
          <circle class="pupil-white tr-op" cx="350" cy="300" r="30" fill="#ffffff" />
          
          <circle class="pupil-yellow tr-op" cx="150" cy="300" r="30" fill="#facc15" filter="url(#glow-yellow)" />
          <circle class="pupil-yellow tr-op" cx="350" cy="300" r="30" fill="#facc15" filter="url(#glow-yellow)" />
        </g>

        <line class="brow-L tr-op hide-on-final" x1="90" y1="195" x2="185" y2="225" stroke="#ffffff" stroke-width="18" stroke-linecap="round" />
        <line class="brow-R tr-op hide-on-final" x1="410" y1="195" x2="315" y2="225" stroke="#ffffff" stroke-width="18" stroke-linecap="round" />

        <path class="code-eye tr-op hide-on-final" d="M 170 255 L 120 300 L 170 345" fill="none" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
        <path class="code-eye tr-op hide-on-final" d="M 330 255 L 380 300 L 330 345" fill="none" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />

        <path class="beak-normal tr-op hide-on-final" d="M 240 330 L 260 330 L 250 345 Z" fill="#ffffff" />
        <line class="mouth-angry tr-op hide-on-final" x1="210" y1="370" x2="290" y2="370" stroke="#ffffff" stroke-width="20" stroke-linecap="round" />
        <path class="beak-final tr-op hide-on-final" d="M 215 320 L 285 320 L 250 385 Z" fill="#000000" stroke="#000000" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />

        <line class="owl-foot tr-op hide-on-final" x1="275" y1="415" x2="225" y2="465" stroke="#ffffff" stroke-width="32" stroke-linecap="round" />

        <g class="owl-final tr-op">
          <g stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
            <path d="M 60 280 L 70 110 L 210 200 L 250 230 L 290 200 L 430 110 L 440 280" fill="none" stroke-width="32"/>
            <circle cx="150" cy="300" r="90" fill="#1a1f2e" stroke-width="32"/>
            <circle cx="350" cy="300" r="90" fill="#1a1f2e" stroke-width="32"/>
            <path d="M 170 255 L 120 300 L 170 345" fill="none" stroke-width="32"/>
            <path d="M 330 255 L 380 300 L 330 345" fill="none" stroke-width="32"/>
            <path d="M 215 320 L 285 320 L 250 385 Z" fill="#ffffff" stroke-width="16"/>
            <line x1="275" y1="415" x2="225" y2="465" stroke-width="32"/>
          </g>
        </g>
      </svg>
    </div>
    <div class="owl-brand">RepoOwl</div>
    <div class="owl-sub">AI-Powered GitHub Issue Triage</div>
    <div class="owl-bar-wrap">
      <div class="owl-bar-fill"></div>
    </div>
  </div>
</template>

<div id="loader-host"></div>

<!-- Flutter bootstrap -->
<script src="flutter_bootstrap.js" async></script>

<script>
(function() {
  // Attach the loader template into an isolated Shadow DOM
  var host = document.getElementById('loader-host');
  var shadow = host.attachShadow({mode: 'open'});
  shadow.appendChild(document.getElementById('loader-template').content.cloneNode(true));

  var owlLoader = shadow.querySelector('#owl-loader');
  var dismissed = false;
  var animDone  = false;

  function dismiss() {
    if (dismissed) return;
    dismissed = true;
    if (!owlLoader) return;
    owlLoader.classList.add('exit');
    setTimeout(function () {
      if (host && host.parentNode) host.parentNode.removeChild(host);
    }, 1300);
  }

  var steps = [
    { time: 50,   cls: 'step-0' },
    { time: 900,  cls: 'step-1' },
    { time: 2600, cls: 'step-2' },
    { time: 3200, cls: 'step-3' },
    { time: 3800, cls: 'step-4' },
    { time: 4500, cls: 'step-5' },
    { time: 5100, cls: 'step-6' },
    { time: 5600, cls: 'step-7' }
  ];

  steps.forEach(function(s) {
    setTimeout(function() {
      if (owlLoader) owlLoader.classList.add(s.cls);
    }, s.time);
  });

  setTimeout(function() {
    animDone = true;
    dismiss();
  }, 6600);

  window.addEventListener('flutter-first-frame', function () {
    if (animDone) dismiss();
  });
})();
</script>

</body>
</html>
