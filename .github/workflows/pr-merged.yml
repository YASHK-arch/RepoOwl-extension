name: PR Merged Comment

on:
  pull_request_target:
    types:
      - closed

jobs:
  comment-on-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🎉 Merged! Thanks for contributing to RepoOwl.\n\nIf the project has been useful to you, a ⭐ star on the repo is the easiest way to support it — it helps RepoOwl get discovered by more developers.\n\nKeep an eye on open issues for your next contribution!'
            })
