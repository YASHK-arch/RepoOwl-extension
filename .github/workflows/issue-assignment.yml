name: Issue Assignment Rules
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  assign-warning:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Send Assignment Warning
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Thanks for opening this issue!\n\nA maintainer will assign it soon.\n\nPlease don't start working until assigned."
            })

  auto-assign:
    if: github.event_name == 'issue_comment' && github.event.action == 'created' && !github.event.issue.pull_request
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Assign User on Request
        uses: actions/github-script@v6
        with:
          script: |
            const comment = context.payload.comment.body.trim().toLowerCase();
            const issue = context.payload.issue;
            
            // Check if comment is exactly '/assign me'
            if (comment === '/assign me') {
              // Check if the issue is already assigned
              if (issue.assignees && issue.assignees.length > 0) {
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `Sorry @${context.actor}, this issue is already assigned to someone else.`
                });
                return;
              }

              // Try to assign the user
              try {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  assignees: [context.actor]
                });
                
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `Assigned to @${context.actor}! Happy contributing. 🚀`
                });
              } catch (error) {
                console.log("Error assigning user:", error);
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `Sorry @${context.actor}, I couldn't assign you. Please ensure you have permissions or the repository is correctly configured.`
                });
              }
            }
