name: Bug Report
description: Report a bug to help us improve
title: "[BUG]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this bug!

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened?
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. Error appears...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen?

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag screenshots here

  - type: input
    id: browser
    attributes:
      label: Browser

  - type: input
    id: os
    attributes:
      label: Operating System

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Critical

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues
        - label: I am willing to work on this
