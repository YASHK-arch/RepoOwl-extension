name: Good First Issue
description: Suggest an easy beginner task
title: "[GOOD FIRST ISSUE]: "
labels:
  - good first issue

body:
  - type: textarea
    id: task
    attributes:
      label: Task Description
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      options:
        - Easy
        - Intermediate

  - type: input
    id: files
    attributes:
      label: Files to modify

  - type: input
    id: skills
    attributes:
      label: Skills Required

  - type: textarea
    id: expected
    attributes:
      label: Expected Output

  - type: input
    id: time
    attributes:
      label: Estimated Time
