name: Feature Request
description: Suggest a new feature
title: "[FEATURE]: "
labels:
  - enhancement

body:
  - type: textarea
    id: feature
    attributes:
      label: Feature Description
      placeholder: Explain your idea
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why is it useful?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing feature requests
